<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col" style="background-color: aqua;">
                <h1>첫번째</h1>
            </div>
            <div class="col" style="background-color: rgb(140, 255, 127);">
                <h1>두번째</h1>
            </div>
            <div class="col" style="background-color: rgb(255, 234, 0);">
                <h1>세번째</h1>
            </div>
            <div class="col" style="background-color: rgb(255, 0, 0);">
                <h1>네번째</h1>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <button class="btn btn-primary" style="margin: 1rem;">로그인</button>
            </div>
        </div>
    </div>
    <div class="container" style="background-color: rgb(190, 190, 190);">
        <h1>구역</h1>
        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Corporis at odit illum quasi odio velit atque
            eligendi tempore, iusto nostrum exercitationem in debitis impedit minima maxime iste excepturi. Facilis,
            placeat.</p>
    </div>
    <h1>Hello, world!</h1>
    <table class="table">
        <tr>
            <td> 1번 </td>
            <td> 2번 </td>
        </tr class="table-danger">
        <tr class="table-warning">
            <td> 열1 </td>
            <td> 열2 </td>
            <td>열3</td>
        </tr>
        <tr class="table-info">
            <td> 열1 </td>
            <td> 열2 </td>
            <td>열3</td>
        </tr>
        <tr class="table-light">
            <td> 열1 </td>
            <td> 열2 </td>
            <td>열3</td>
        </tr>
    </table>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
